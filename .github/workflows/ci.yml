name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run check         # Biome: format + lint
      - run: pnpm run typecheck
      - run: pnpm run build         # tsc -> dist (verifies the publishable build)
      # extract.test.ts drives a real headless Chromium (data: URLs, no network).
      - run: pnpm --filter @designscan/extractor exec playwright install --with-deps chromium
      - run: pnpm run test
      - run: pnpm run lint:designmd  # validate the committed example DESIGN.md files
      # Corpus freshness: regenerate the gallery from the committed raw JSON
      # (network-free) and fail if it differs — a generator change merged without
      # re-running `pnpm seed rebuild` would otherwise leave the public gallery
      # silently stale (exactly how the quoted-font-family preview bug shipped).
      - run: pnpm seed rebuild && git diff --exit-code examples/
