name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # `npm install`, not `npm ci`: npm ci can skip a package's platform-specific
      # optional dep (the native rollup binary) on Linux — npm/cli#4828 — which
      # then breaks vitest. install resolves the current platform's binary.
      - run: npm install --no-audit --no-fund
      - run: npm run check         # Biome: format + lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run lint:designmd  # validate the committed example DESIGN.md files
