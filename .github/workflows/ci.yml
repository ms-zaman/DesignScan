name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run check         # Biome: format + lint
      - run: pnpm run typecheck
      - run: pnpm run build         # tsc -> dist (verifies the publishable build)
      # extract.test.ts drives a real headless Chromium (data: URLs, no network).
      - run: pnpm --filter @designscan/extractor exec playwright install --with-deps chromium
      - run: pnpm run test
      - run: pnpm run lint:designmd  # validate the committed example DESIGN.md files
